<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cube Jump</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --bg-color: #0d0221;
        }
        @font-face {
            font-family: 'New York Sans';
            src: local('New York Sans'), local('NYC Sans'), local('Segoe UI'), local('Roboto'), sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a0a33, #0d0221);
            overflow: hidden;
            font-family: 'New York Sans', 'Arial', sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
        }
        canvas {
            display: block;
            border-radius: 8px;
            max-width: 100vw;
            max-height: 70vh;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            padding: 10px;
            box-sizing: border-box;
        }
        .control-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
            transition: transform 0.1s, background 0.1s;
        }
        .btn:active {
            transform: scale(0.9);
            background: rgba(0, 242, 255, 0.3);
        }
        @media (max-width: 600px) {
            .btn {
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btn-down">↓</div>
            <div class="btn" id="btn-up">↑</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <!-- Replace with Felicia - My System when available -->
    </audio>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
