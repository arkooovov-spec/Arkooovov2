<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cube Jump</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --bg-color: #0d0221;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a0a33, #0d0221);
            overflow: hidden;
            font-family: 'ny sans', 'Arial', sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 2, 33, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
        h1 {
            font-size: 48px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 10px;
            text-align: center;
        }
        .credits {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 40px;
            text-align: center;
        }
        .menu-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--neon-blue);
            color: white;
            font-family: 'ny sans', 'Arial', sans-serif;
            font-size: 24px;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transition: all 0.2s;
            margin: 10px;
        }
        .menu-btn:hover {
            background: rgba(0, 242, 255, 0.3);
            transform: scale(1.05);
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .level-btn {
            background: rgba(57, 255, 20, 0.1);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }
        .level-btn:hover {
            background: rgba(57, 255, 20, 0.3);
        }
        #countdown-text {
            font-size: 120px;
            color: var(--neon-pink);
            text-shadow: 0 0 40px var(--neon-pink);
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }
        canvas {
            display: block;
            border-radius: 8px;
            max-width: 100vw;
            max-height: 70vh;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            padding: 10px;
            box-sizing: border-box;
        }
        .control-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
            transition: transform 0.1s, background 0.1s;
        }
        .btn:active {
            transform: scale(0.9);
            background: rgba(0, 242, 255, 0.3);
        }
        @media (max-width: 600px) {
            .btn {
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="main-menu" class="overlay">
            <h1>Geometry Chaos</h1>
            <div class="credits">Mde by Dmitriy Tarasov & Fedor Mikhailikov</div>
            <button class="menu-btn" id="btn-levels">Выбор уровня</button>
        </div>

        <div id="level-menu" class="overlay hidden">
            <h1>Уровни</h1>
            <button class="menu-btn level-btn" id="btn-lvl-1">Текущий уровень</button>
        </div>

        <div id="countdown-overlay" class="overlay hidden" style="background: rgba(13, 2, 33, 0.5);">
            <div id="countdown-text">3</div>
        </div>

        <div id="win-overlay" class="overlay hidden">
            <h1 style="color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green);">Поздравляем!</h1>
            <button class="menu-btn" id="btn-continue">Продолжить</button>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btn-down">↓</div>
            <div class="btn" id="btn-up">↑</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
